<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный Плеер</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background: #121212; color: white; text-align: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 85%; padding: 14px; border: none; border-radius: 25px; margin-bottom: 20px; text-align: center; font-size: 16px; background: #2a2a2a; color: white; outline: none; }
        button { padding: 14px 30px; border: none; border-radius: 25px; background: #1db954; color: white; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1aa34a; }
        #loader { display: none; color: #1db954; font-weight: bold; margin: 20px 0; }

        /* Стили списка результатов */
        .results-list { margin-top: 25px; text-align: left; max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .track-item { display: flex; align-items: center; background: #282828; padding: 10px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .track-item:hover { background: #333; }
        .track-item img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; margin-right: 15px; }
        .track-info { flex-grow: 1; min-width: 0; }
        .track-info h4 { margin: 0 0 5px 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info p { margin: 0; color: #b3b3b3; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Главный плеер */
        #player-box { margin-top: 30px; display: none; border-top: 1px solid #333; padding-top: 20px; }
        #main-cover { width: 180px; height: 180px; border-radius: 15px; object-fit: cover; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        #track-title { margin: 10px 0 5px 0; font-size: 20px; }
        #track-artist { color: #b3b3b3; margin: 0 0 20px 0; font-size: 14px; }
        audio { width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <h2>Моя Музыкальная База</h2>
    <input type="text" id="query" placeholder="Введите название песни или артиста...">
    <br>
    <button onclick="searchTracks()">Найти варианты</button>

    <div id="loader">⚡ Ищем варианты треков...</div>

    <!-- Сюда будут рендериться 5 результатов -->
    <div id="results" class="results-list"></div>

    <!-- Сам аудиоплеер -->
    <div id="player-box">
        <img id="main-cover" src="" alt="Обложка">
        <h3 id="track-title">Название</h3>
        <p id="track-artist">Исполнитель</p>
        <audio id="audio-player" controls autoplay></audio>
    </div>
</div>

<script>
    let foundTracks = []; // Сюда сохраняем массив результатов от сервера

    async function searchTracks() {
        const query = document.getElementById('query').value;
        if (!query) return alert('Введите текст запроса!');

        document.getElementById('loader').style.display = 'block';
        document.getElementById('results').innerHTML = '';
        document.getElementById('player-box').style.display = 'none';

        try {
            const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();

            document.getElementById('loader').style.display = 'none';

            if (data.error) return alert(data.error);

            foundTracks = data.tracks;
            const resultsContainer = document.getElementById('results');

            // Отрисовываем каждый трек в виде строчки списка
            foundTracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item';
                item.onclick = () => playTrack(index); // По клику запускаем функцию плеера

                item.innerHTML = `
                    <img src="${track.thumbnail || 'https://placeholder.com'}" alt="cover">
                    <div class="track-info">
                        <h4>${track.title}</h4>
                        <p>${track.artist}</p>
                    </div>
                `;
                resultsContainer.appendChild(item);
            });

        } catch (err) {
            document.getElementById('loader').style.display = 'none';
            alert('Ошибка соединения с сервером');
        }
    }

    // Функция запуска конкретного трека из списка
    function playTrack(index) {
        const track = foundTracks[index];

        document.getElementById('main-cover').src = track.thumbnail;
        document.getElementById('track-title').innerText = track.title;
        document.getElementById('track-artist').innerText = track.artist;

        const player = document.getElementById('audio-player');
        player.src = track.stream_url;

        document.getElementById('player-box').style.display = 'block';
        player.play().catch(e => console.log("Нажмите Play вручную в плеере"));
    }
</script>
</body>
</html>
